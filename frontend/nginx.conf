# HTTP 服务器 - 将所有 HTTP 请求重定向到 HTTPS
server {
    listen 80;
    server_name bzyu.cn www.bzyu.cn;
    return 301 https://$host$request_uri;
}

# HTTPS 服务器
server {
    listen 443 ssl;
    server_name bzyu.cn www.bzyu.cn;

    # SSL 证书配置（使用 Certbot 生成的证书）
    ssl_certificate /etc/letsencrypt/live/bzyu.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bzyu.cn/privkey.pem;

    # 推荐的安全配置（可选但建议添加）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}