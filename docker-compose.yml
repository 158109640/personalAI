services:
  # ===== 后端服务 =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personalai-backend
    working_dir: /app/backend
    ports:
      - "8000:8000"  # 后端 API 端口
    environment:
      - ENV=production
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env.production
    volumes:
      - ./uploads:/app/backend/uploads
      - ./vector_stores:/app/backend/vector_stores
      - ./chroma_db:/app/backend/chroma_db
    depends_on:
      - redis
    restart: unless-stopped

  # ===== 前端服务 =====
  frontend:
    volumes:
      -./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro  # 挂载证书目录
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: personalai-frontend
    ports:
      - "80:80"  # 前端页面占 80 端口
    depends_on:
      - backend
    restart: unless-stopped

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: personalai-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis-data: