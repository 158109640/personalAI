services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personalai-backend
    ports:
      - "80:8000"
    environment:
      - ENV=production
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env.production
    volumes:
      - ./uploads:/app/backend/uploads
      - ./vector_stores:/app/backend/vector_stores
      - ./chroma_db:/app/backend/chroma_db
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: personalai-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data: